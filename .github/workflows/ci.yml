name: CI con SonarQube

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para que SonarQube vea el historial Git

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          # Instalamos pytest y pytest-cov directamente para evitar fallos
          pip install pytest pytest-cov
          # Si tienes un requirements.txt, descomenta la siguiente línea:
          # pip install -r requirements.txt

      - name: Crear tests básicos (si no existen)
        run: |
          mkdir -p tests
          # Solo crea el test dummy si no hay archivos .py en tests/
          if [ -z "$(ls -A tests/*.py 2>/dev/null)" ]; then
            echo 'def test_dummy(): assert True' > tests/test_dummy.py
          fi

      - name: Ejecutar tests con cobertura
        run: |
          # --cov-omit excluye los archivos de tests del informe de cobertura
          python -m pytest --cov=. --cov-omit=tests/* --cov-report=xml --cov-report=term tests/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=chatbot-copagos-ec
            -Dsonar.python.version=3.11
            -Dsonar.sources=./
            -Dsonar.inclusions=**/*.py
            -Dsonar.exclusions=venv/**, .venv/**, **/__pycache__/**, **/*.pyc, assets/**, .streamlit/**, **/secrets.toml
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=coverage.xml